<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Formulário</title>
    <style type="text/css">@import url(css/estilo_10.css);</style>
</head>
<body>

<div class="container">
    <div class="form-box">
        <div class="topo">
            <h2>EVENT REGISTRATION FORM</h2>
        </div>

        <form>
    
            <div class="grupo">
                <label>Name</label>
                <div class="duplo">
                    <input type="text" placeholder="First Name">
                    <input type="text" placeholder="Last Name">
                </div>
            </div>

            <div class="grupo">
                <label>Company</label>
                <input type="text">
            </div>

            <div class="grupo">
                <label>Email</label>
                <input type="email">
            </div>


            <div class="grupo">
                <label>Phone</label>
                <div class="duplo">
                    <input type="text" placeholder="Area Code" class="pequeno">
                    <input type="text" placeholder="Phone Number">
                </div>
            </div>

    
            <div class="grupo">
                <label>Subject</label>
                <select>
                    <option>Choose option</option>
                </select>
            </div>

            <div class="grupo">
                <label>Are you an existing customer?</label>
                <div class="radio">
                    <input type="radio" name="cliente"> Yes
                    <input type="radio" name="cliente"> No
                </div>
            </div>

            <button type="submit">REGISTER</button>
        </form>
    </div>
</div>

</body>
</html>
