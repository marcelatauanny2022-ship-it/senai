<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TESTE DE AMIZADE</title>
    <style type="text/css">
        @import url(
            "css/rafa_01.css"
        );</style
    </style>
</head>
<body>
    
    <form>
        <h2>teste oficial de amizade pra RAFA</h2>
        <p>Você me acha uma pessoa INCRÍVEL??</p>

        <button type="button" onclick="mensagem()">
            sim 😍
        </button>

        <button type="button" id="nao">
            Não 😒
        </button>
        
    </form>

    <script>
        const botaoNao = document.getElementById("nao");

    botaoNao.addEventListener("mouseover", function() {
        const x = Math.random() * 200 - 100;
        const y = Math.random() * 200 - 100;

        botaoNao.style.transform = `translate(${x}px, ${y}px)`;
    });

     function mensagem() {
            alert("Sabia 😎 você tem bom gosto!");
        }
        
            

    </script>
</body>
</html>
