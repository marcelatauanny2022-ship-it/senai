<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caixa de formulario</title>
</head>
<body>
   <h2>Envie uma mensagem <br>
    preenchendo o formulário abaixo
    </h2>
    <form action="" method="">
       <label for="">Seu nome:</label>
        <input type="text" placeholder="Meu nome e meu sobre nome">
        <br><br>

        <label>Seu telefone:</label><br> 
        <input type="text" placeholder="999999999" />
        <br><br>
       
        <label for="">Seu Email:</label><br>
        <input type="text" placeholder="meuemail@gamil.com"> 
        <br><br>

        <label for="">Deseja receber nossas novidades?</label><br> 

        <input type="radio" name="novidades" checked> Sim
        <input type="radio" name="novidades" > Não
        <br><br> 
        Aonde nós encontrou: <br> 
        exemplo de checbox <br> 
        <input type="checkbox" name="opc1"/> E-mail
        <input type="checkbox" name="opc2"/> Google
        <input type="checkbox" name="opc3"/> Youtube <br><br>

        Seleciona uma opção na lista
        <select>
            <option value=>Seleciona uma opção</option>
            <option value="Brasil">Brasil - BR </option>
            <option value="Argentina">Brasil - AG</option>
            <option value="chile">Chile-CH </option>
        </select>
            
        
            <label for="">Sua mensagem:</label><br />
        <textarea placeholder="Minha mensagem de exemplo" rows="9"></textarea>
        <br><br> 

        <input type="submit" value="Enviar">
    
        



    </form>
  

    
</body>
</html>
