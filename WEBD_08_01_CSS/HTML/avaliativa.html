<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário de contato</title>
</head>
<body>
    <h2>Formúlario de Contato</h2>
    <p>deixe-nos saber suas perguntas, sugestões ou dúvidas, preenchendo o formulário</p>
 <br><br>
    <form action="" method="post">

    <label for="">Nome</label>  
    <input type="text" name="nome" placeholder="Nome">
    <input type="text" name="sobrenome" placeholder="último">
    <br><br>
    
    <label for="">E-mail</label>
    <input type="text" name="Email" style="width: 300px;">
    <br><br>
    
    <label for="">Telefone</label>
    <input type="tel" name="Telefone" placeholder="### ### ###">
    <br><br>

        <label for="">Assunto</label>
        <select name="Assunto">
            <option value="">Consulta</option>
            <option value="Suporte">Suporte</option>
            <option value="financeiro">Financeiro</option>
        </select>
        <br><br>

        <label for="mensagem"></label>
        <textarea name="mensagem" rows="6" style="width: 450px;"></textarea>
        <br><br>

        <input type="submit" value="Enviar o Formúlario de Contato"
            style="background-color: 4a4a4a; color: white; padding: 10px 20px; border: none; cursor:pointer;"/>
            
        
        
        </select>
       
    








    </form>
</body>
</html>
